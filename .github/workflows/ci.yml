name: CI

on:
  push:
    branches: [ sfa-v7-release, main ]
  pull_request:
    branches: [ sfa-v7-release, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Check project structure
      run: |
        echo "Checking project structure..."
        ls -la
        echo "Project type: Python/SFA project"
        echo "No Cargo.toml found - skipping Rust build"
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt found"
        pip install pytest 2>/dev/null || echo "pytest not available"
    
    - name: Run basic checks
      run: |
        echo "Running basic project checks..."
        if [ -f "benchmark_suite.py" ]; then
          echo "Found benchmark suite"
        fi
        if [ -f "README.md" ]; then
          echo "Found README"
        fi
        echo "Project structure validated"
