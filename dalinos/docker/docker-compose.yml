version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: dalinos
      POSTGRES_USER: dalinos
      POSTGRES_PASSWORD: dalinos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Backend
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://dalinos:dalinos_password@postgres:5432/dalinos
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
